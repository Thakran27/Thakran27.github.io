<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#17123a">
  <title>404 · Dr. Anjali Thakran</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;800&family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;text-align:center;color:#fff;
      font-family:"Manrope",Arial,sans-serif;padding:24px;
      background:
        radial-gradient(720px 480px at 88% 8%,rgba(124,99,255,.4),transparent 62%),
        radial-gradient(640px 460px at 4% 96%,rgba(255,92,57,.28),transparent 60%),
        linear-gradient(120deg,#120d2e 0%,#1c1250 55%,#341b60 100%)}
    .atom{width:150px;height:150px;margin:0 auto 24px;position:relative}
    .atom .core{position:absolute;left:50%;top:50%;width:20px;height:20px;margin:-10px 0 0 -10px;border-radius:50%;background:#ff6a3d;box-shadow:0 0 26px rgba(255,106,61,.8)}
    .orbit{position:absolute;inset:0;border:2px solid rgba(255,255,255,.25);border-radius:50%;transform:rotateX(70deg);animation:spin 5s linear infinite}
    .orbit.o2{animation-duration:8s;transform:rotateX(70deg) rotate(60deg)}
    .orbit i{position:absolute;top:-5px;left:50%;width:9px;height:9px;border-radius:50%;background:#cfc4ff}
    @keyframes spin{to{transform:rotateX(70deg) rotate(360deg)}}
    .orbit.o2{animation-name:spin2}
    @keyframes spin2{from{transform:rotateX(70deg) rotate(60deg)}to{transform:rotateX(70deg) rotate(420deg)}}
    h1{font-family:"Plus Jakarta Sans",Arial,sans-serif;font-weight:800;font-size:clamp(3.4rem,9vw,5.5rem);margin:0 0 10px;line-height:1;
      background:linear-gradient(92deg,#a48fff,#ff8a5c);-webkit-background-clip:text;background-clip:text;color:transparent}
    h2{font-family:"Plus Jakarta Sans",Arial,sans-serif;font-weight:800;font-size:clamp(1.2rem,3vw,1.7rem);margin:0 0 14px}
    p{color:#c9c2e8;max-width:440px;margin:0 auto 30px;line-height:1.65}
    a.btn{display:inline-flex;align-items:center;min-height:46px;padding:11px 26px;border-radius:999px;text-decoration:none;font-weight:700;color:#fff;
      background:linear-gradient(92deg,#ff5c39,#ff8a3d);box-shadow:0 10px 26px rgba(255,92,57,.35);transition:transform .18s ease}
    a.btn:hover{transform:translateY(-2px)}
    @media(prefers-reduced-motion:reduce){.orbit{animation:none}}
  </style>
</head>
<body>
  <div>
    <div class="atom" aria-hidden="true">
      <div class="orbit"><i></i></div>
      <div class="orbit o2"><i></i></div>
      <div class="core"></div>
    </div>
    <h1>404</h1>
    <h2>This page quantum-tunneled away.</h2>
    <p>The URL you followed has zero probability density here. Its wavefunction has collapsed somewhere else — but the homepage is in a well-defined state.</p>
    <a class="btn" href="/">Back to the homepage</a>
  </div>
</body>
</html>
